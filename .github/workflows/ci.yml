name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install LaTeX tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-xetex texlive-latex-extra

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Type-check
        run: python -m mypy src

      - name: Compile Python files
        run: python -m compileall src tests scripts run_job_pipeline.py linkedin_job_scraper.py job_fit_evaluator.py job_scraper_config.py

      - name: Smoke-test CLIs
        run: |
          PYTHONPATH=src python -m jobfinder.pipeline.cli --help
          PYTHONPATH=src python -m jobfinder.scraper.cli --help
          PYTHONPATH=src python -m jobfinder.evaluator.cli --help

      - name: Validate JSON config
        run: python -m json.tool configs/filters.json

      - name: Test
        run: python -m pytest
