name: JobFinder Pipeline

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Job sources to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - linkedin
          - indeed
          - stepstone
          - all
      posted_time_window:
        description: "Provider posted-time window"
        required: true
        default: "since_previous_run"
        type: choice
        options:
          - since_previous_run
          - last_24h
          - last_7d
          - backfill
      max_applicants:
        description: "Maximum applicants per job"
        required: true
        default: "50"
        type: choice
        options:
          - "50"
          - "100"
          - "200"
          - no_limit
      run_mode:
        description: "Pipeline mode"
        required: true
        default: "scrape_and_evaluate"
        type: choice
        options:
          - scrape_and_evaluate
          - scrape_only
      unsuitable_rows:
        description: "Not-suitable rows in the final output"
        required: true
        default: "single_label_only"
        type: choice
        options:
          - single_label_only
          - keep_all

  schedule:
    # Runs once daily during the 07:00 UTC hour. Avoid minute 0 because GitHub
    # may delay or drop scheduled jobs at the top of the hour under high load.
    - cron: "17 7 * * *"

permissions:
  contents: read

concurrency:
  group: jobfinder-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-evaluate:
    name: Run JobFinder pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      GOOGLE_DRIVE_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}
      JOB_EVAL_CV_DRIVE_FOLDER_ID: ${{ secrets.JOB_EVAL_CV_DRIVE_FOLDER_ID }}
      JOB_KEYWORDS_TEXT: ${{ secrets.JOB_KEYWORDS_TEXT }}
      MASTER_PROMPT_TEXT: ${{ secrets.MASTER_PROMPT_TEXT }}
      MASTER_CV_TEX: ${{ secrets.MASTER_CV_TEX }}
      CV_PHOTO_BASE64: ${{ secrets.CV_PHOTO_BASE64 }}
      JOBFINDER_SCRAPER_OUTPUT_MODE: "google_sheets"
      JOBFINDER_SCRAPER_SOURCES: ${{ github.event.inputs.sources || 'all' }}
      JOBFINDER_PIPELINE_MODE: ${{ github.event.inputs.run_mode || 'scrape_and_evaluate' }}
      JOBFINDER_SCRAPER_POSTED_TIME_WINDOW: ${{ github.event.inputs.posted_time_window || 'since_previous_run' }}
      JOBFINDER_SCRAPER_MAX_APPLICANTS: ${{ github.event.inputs.max_applicants == 'no_limit' && '0' || github.event.inputs.max_applicants || '50' }}
      JOBFINDER_SCRAPER_SEARCH_CONCURRENCY: "15"
      JOBFINDER_SCRAPER_SEARCH_WINDOW_BUFFER_SECONDS: "3600"
      APIFY_RUN_MEMORY_MB: "512"
      APIFY_RUN_TIMEOUT_SECONDS: "3600"
      APIFY_CLIENT_TIMEOUT_SECONDS: "120"
      APIFY_TRANSIENT_ERROR_RETRIES: "5"
      APIFY_RETRY_DELAY_SECONDS: "30"
      GOOGLE_API_TIMEOUT_SECONDS: "120"
      GOOGLE_API_RETRIES: "3"
      JOBFINDER_PIPELINE_STEP_TIMEOUT_SECONDS: "21000"
      JOBFINDER_SCRAPER_DELAY_BETWEEN_REQUESTS: "0"
      JOBFINDER_SCRAPER_SCRAPE_COMPANY_DETAILS: "false"
      INDEED_COUNTRY: "DE"
      INDEED_LOCATION: "Germany"
      STEPSTONE_LOCATION: "deutschland"
      STEPSTONE_MAX_CONCURRENCY: "10"
      STEPSTONE_MAX_REQUEST_RETRIES: "3"
      JOBFINDER_SCRAPER_TIMEZONE: Europe/Berlin
      JOBFINDER_SCRAPER_POSTED_TIMEZONE: Europe/Berlin
      JOB_EVAL_OPENAI_MODEL: "gpt-5-mini"
      JOB_EVAL_CONCURRENCY: "8"
      JOB_EVAL_BATCH_SIZE: "40"
      JOB_EVAL_CV_PHOTO_FILE: cv/photo.jpg
      JOB_EVAL_CV_PDF_OUTPUT: "true"
      JOB_EVAL_CV_PDF_APPLICANT_NAME: "Amir Donyadide"
      JOB_EVAL_CV_PDF_TIMEOUT: "120"
      JOB_EVAL_LARGE_QUEUE_THRESHOLD: "200"
      JOB_EVAL_LARGE_QUEUE_SLEEP_MS: "2000"
      JOB_EVAL_UNSUITABLE_ROW_POLICY: ${{ github.event.inputs.unsuitable_rows || 'single_label_only' }}
      JOBFINDER_PIPELINE_REPORT_FILE: reports/pipeline_preflight.json
      JOBFINDER_SCRAPER_REPORT_FILE: reports/scraper.json
      JOBFINDER_EVALUATOR_REPORT_FILE: reports/evaluator.json
      PYTHONUNBUFFERED: "1"
      TZ: Europe/Berlin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install LaTeX tools
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-xetex texlive-latex-extra

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::error::Missing repository secret APIFY_API_TOKEN. Save one Apify token, or up to 12 tokens separated by semicolons."
            missing=1
          fi

          apify_token_count="$(
            python - <<'PY'
          import os

          tokens = []
          seen = set()
          for part in os.environ.get("APIFY_API_TOKEN", "").split(";"):
              token = part.strip()
              if token and token != "apify_api_XXXXXXXXXXXX" and token not in seen:
                  tokens.append(token)
                  seen.add(token)

          print(len(tokens))
          PY
          )"

          if [ "$apify_token_count" -gt 12 ]; then
            echo "::error::APIFY_API_TOKEN supports at most 12 semicolon-separated tokens."
            missing=1
          fi

          should_evaluate=1
          if [ "${JOBFINDER_PIPELINE_MODE}" = "scrape_only" ]; then
            should_evaluate=0
          fi

          if [ "$should_evaluate" -eq 1 ] && [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::Missing repository secret OPENAI_API_KEY."
            missing=1
          fi

          google_token_json="${GOOGLE_TOKEN_JSON:-${GOOGLE_DRIVE_TOKEN_JSON:-}}"
          if [ -z "${google_token_json}" ]; then
            echo "::error::Missing repository secret GOOGLE_TOKEN_JSON. Paste the full authorized-user token JSON from google_token.json into this secret."
            missing=1
          fi

          if [ -z "${GOOGLE_SPREADSHEET_ID}" ]; then
            echo "::error::Missing repository secret GOOGLE_SPREADSHEET_ID. GitHub Actions runners are temporary, so the spreadsheet ID must be saved as a secret."
            missing=1
          fi

          if [ "$should_evaluate" -eq 1 ] && [ -z "${JOB_EVAL_CV_DRIVE_FOLDER_ID}" ]; then
            echo "::error::Missing repository secret JOB_EVAL_CV_DRIVE_FOLDER_ID. Use the ID of the Drive folder that should contain generated CV PDFs."
            missing=1
          fi

          if [ -z "${JOB_KEYWORDS_TEXT}" ]; then
            echo "::error::Missing repository secret JOB_KEYWORDS_TEXT."
            missing=1
          fi

          if [ "$should_evaluate" -eq 1 ] && [ -z "${MASTER_PROMPT_TEXT}" ]; then
            echo "::error::Missing repository secret MASTER_PROMPT_TEXT."
            missing=1
          fi

          if [ "$should_evaluate" -eq 1 ] && [ -z "${MASTER_CV_TEX}" ]; then
            echo "::error::Missing repository secret MASTER_CV_TEX."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write private input files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          private_files = {
              Path("configs/keywords.txt"): os.environ["JOB_KEYWORDS_TEXT"],
          }

          if os.environ["JOBFINDER_PIPELINE_MODE"] != "scrape_only":
              private_files.update(
                  {
                      Path("prompts/master_prompt.txt"): os.environ["MASTER_PROMPT_TEXT"],
                      Path("cv/master_cv.tex"): os.environ["MASTER_CV_TEX"],
                  }
              )

          for path, value in private_files.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(value.strip() + "\n", encoding="utf-8")

          photo_base64 = "".join(os.environ.get("CV_PHOTO_BASE64", "").split())
          if photo_base64 and os.environ["JOBFINDER_PIPELINE_MODE"] != "scrape_only":
              try:
                  photo_bytes = base64.b64decode(photo_base64, validate=True)
              except binascii.Error as exc:
                  raise SystemExit(f"CV_PHOTO_BASE64 is not valid base64: {exc}") from exc
              photo_path = Path(os.environ.get("JOB_EVAL_CV_PHOTO_FILE", "cv/photo.jpg"))
              photo_path.parent.mkdir(parents=True, exist_ok=True)
              photo_path.write_bytes(photo_bytes)
          PY

      - name: Write Google credential files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          import json
          import sys

          google_token_json = (
              os.environ.get("GOOGLE_TOKEN_JSON", "").strip()
              or os.environ.get("GOOGLE_DRIVE_TOKEN_JSON", "").strip()
          )
          spreadsheet_id = os.environ.get("GOOGLE_SPREADSHEET_ID", "").strip()

          try:
              google_token = json.loads(google_token_json)
          except json.JSONDecodeError as exc:
              print(f"::error::GOOGLE_TOKEN_JSON is not valid JSON: {exc}")
              sys.exit(1)

          has_authorized_user_fields = all(
              google_token.get(key)
              for key in ("client_id", "client_secret", "refresh_token")
          )
          if (
              google_token.get("type") != "authorized_user"
              and not has_authorized_user_fields
          ):
              print(
                  "::error::GOOGLE_TOKEN_JSON must be an authorized-user token JSON "
                  "created by the local OAuth browser flow."
              )
              sys.exit(1)

          raw_scopes = google_token.get("scopes") or google_token.get("scope") or []
          if isinstance(raw_scopes, str):
              scopes = set(raw_scopes.split())
          elif isinstance(raw_scopes, list):
              scopes = {str(scope) for scope in raw_scopes}
          else:
              scopes = set()
          required_scopes = {
              "https://www.googleapis.com/auth/spreadsheets",
              "https://www.googleapis.com/auth/drive",
          }
          missing_scopes = sorted(required_scopes - scopes)
          if missing_scopes:
              print(
                  "::error::GOOGLE_TOKEN_JSON is missing required OAuth scope(s): "
                  + ", ".join(missing_scopes)
                  + ". Recreate google_token.json with python -m jobfinder.google_auth."
              )
              sys.exit(1)

          Path("google_token.json").write_text(google_token_json, encoding="utf-8")

          if spreadsheet_id:
              Path("google_spreadsheet_id.txt").write_text(spreadsheet_id, encoding="utf-8")
          PY

          chmod 600 google_token.json

          if [ -f google_spreadsheet_id.txt ]; then
            chmod 600 google_spreadsheet_id.txt
          fi

      - name: Preflight provider access
        shell: bash
        run: |
          set -euo pipefail
          python -u run_job_pipeline.py --mode "${JOBFINDER_PIPELINE_MODE}" --preflight

      - name: Run selected JobFinder pipeline
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports

          echo "Starting JobFinder Pipeline at $(date +'%Y-%m-%dT%H:%M:%S%z') (${TZ})"
          echo "Output mode: ${JOBFINDER_SCRAPER_OUTPUT_MODE}"
          echo "Pipeline mode: ${JOBFINDER_PIPELINE_MODE}"
          echo "Job sources: ${JOBFINDER_SCRAPER_SOURCES}"
          echo "Posted-time window: ${JOBFINDER_SCRAPER_POSTED_TIME_WINDOW}"
          if [ "${JOBFINDER_SCRAPER_MAX_APPLICANTS}" = "0" ]; then
            echo "Max applicants/job: no limit"
          else
            echo "Max applicants/job: ${JOBFINDER_SCRAPER_MAX_APPLICANTS}"
          fi
          echo "Scraper timezone: ${JOBFINDER_SCRAPER_TIMEZONE}"
          echo "Posted timezone: ${JOBFINDER_SCRAPER_POSTED_TIMEZONE}"
          echo "Search concurrency: ${JOBFINDER_SCRAPER_SEARCH_CONCURRENCY}"
          echo "Search window buffer: ${JOBFINDER_SCRAPER_SEARCH_WINDOW_BUFFER_SECONDS}s"
          echo "Apify child run memory: ${APIFY_RUN_MEMORY_MB} MB"
          echo "Apify child run timeout: ${APIFY_RUN_TIMEOUT_SECONDS}s"
          echo "Apify HTTP request timeout: ${APIFY_CLIENT_TIMEOUT_SECONDS}s"
          echo "Apify transient error retries: ${APIFY_TRANSIENT_ERROR_RETRIES}"
          echo "Apify retry base delay: ${APIFY_RETRY_DELAY_SECONDS}s"
          echo "Evaluator model: ${JOB_EVAL_OPENAI_MODEL}"
          echo "Evaluator concurrency: ${JOB_EVAL_CONCURRENCY}"
          echo "Unsuitable row policy: ${JOB_EVAL_UNSUITABLE_ROW_POLICY}"

          python -u run_job_pipeline.py --mode "${JOBFINDER_PIPELINE_MODE}" 2>&1 | tee pipeline.log
          status=${PIPESTATUS[0]}

          {
            echo "# JobFinder Run Summary"
            echo
            echo "- Status: $([ "$status" -eq 0 ] && echo succeeded || echo failed)"
            echo "- Pipeline mode: ${JOBFINDER_PIPELINE_MODE}"
            echo "- Job sources: ${JOBFINDER_SCRAPER_SOURCES}"
            echo "- Posted-time window: ${JOBFINDER_SCRAPER_POSTED_TIME_WINDOW}"
            echo "- Max applicants/job: $([ "${JOBFINDER_SCRAPER_MAX_APPLICANTS}" = "0" ] && echo "no limit" || echo "${JOBFINDER_SCRAPER_MAX_APPLICANTS}")"
            echo "- Unsuitable row policy: ${JOB_EVAL_UNSUITABLE_ROW_POLICY}"
            echo "- Started at: $(date +'%Y-%m-%dT%H:%M:%S%z')"
            echo "- GitHub run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > reports/workflow_summary.md

          if [ "$status" -ne 0 ]; then
            echo "::error::run_job_pipeline.py failed with exit code ${status}."
            exit "$status"
          fi

          echo "Pipeline finished successfully."

      - name: Upload run reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jobfinder-run-reports
          path: |
            reports/*.json
            reports/*.md
          if-no-files-found: ignore

      - name: Remove private runtime files
        if: always()
        shell: bash
        run: |
          rm -f \
            configs/keywords.txt \
            prompts/master_prompt.txt \
            cv/master_cv.tex \
            cv/photo.jpg \
            google_token.json \
            google_spreadsheet_id.txt \
            pipeline.log
          rm -rf reports
